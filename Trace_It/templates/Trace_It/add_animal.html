{% extends 'Trace_It/base.html' %}

{% block title %}Add Animal - TRACE IT{% endblock %}

{% block content %}
<h2>Add New Animal</h2>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow card-animated">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success btn-animated">Save Animal</button>
                    <a href="{% url 'index' %}" class="btn btn-outline-secondary btn-animated">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
