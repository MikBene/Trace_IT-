<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACE IT - Wildlife Tracking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
            background: #0a0e27;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.05);
            animation: move 25s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        .bg-animation span:nth-child(1) {
            left: 25%;
            width: 80px;
            height: 80px;
            animation-delay: 0s;
            background: rgba(25, 135, 84, 0.15);
        }

        .bg-animation span:nth-child(2) {
            left: 10%;
            width: 20px;
            height: 20px;
            animation-delay: 2s;
            animation-duration: 12s;
            background: rgba(220, 53, 69, 0.15);
        }

        .bg-animation span:nth-child(3) {
            left: 70%;
            width: 20px;
            height: 20px;
            animation-delay: 4s;
            background: rgba(25, 135, 84, 0.1);
        }

        .bg-animation span:nth-child(4) {
            left: 40%;
            width: 60px;
            height: 60px;
            animation-delay: 0s;
            animation-duration: 18s;
            background: rgba(255, 193, 7, 0.1);
        }

        .bg-animation span:nth-child(5) {
            left: 65%;
            width: 20px;
            height: 20px;
            animation-delay: 0s;
            background: rgba(220, 53, 69, 0.1);
        }

        .bg-animation span:nth-child(6) {
            left: 75%;
            width: 110px;
            height: 110px;
            animation-delay: 3s;
            background: rgba(25, 135, 84, 0.08);
        }

        .bg-animation span:nth-child(7) {
            left: 35%;
            width: 150px;
            height: 150px;
            animation-delay: 7s;
            background: rgba(13, 202, 240, 0.08);
        }

        .bg-animation span:nth-child(8) {
            left: 50%;
            width: 25px;
            height: 25px;
            animation-delay: 15s;
            animation-duration: 45s;
            background: rgba(255, 193, 7, 0.12);
        }

        .bg-animation span:nth-child(9) {
            left: 20%;
            width: 15px;
            height: 15px;
            animation-delay: 2s;
            animation-duration: 35s;
            background: rgba(220, 53, 69, 0.1);
        }

        .bg-animation span:nth-child(10) {
            left: 85%;
            width: 150px;
            height: 150px;
            animation-delay: 0s;
            animation-duration: 11s;
            background: rgba(25, 135, 84, 0.06);
        }

        @keyframes move {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 0;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 50%;
            }
        }

        /* Grid Overlay */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(25, 135, 84, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(25, 135, 84, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
        }

        /* Main Card - Glassmorphism */
        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 60px 50px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(25, 135, 84, 0.1);
            animation: cardEntry 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
            transform: translateY(50px) scale(0.9);
        }

        @keyframes cardEntry {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Glowing Border Animation */
        .login-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #198754, #0dcaf0, #198754, #ffc107, #198754);
            background-size: 400% 400%;
            border-radius: 32px;
            z-index: -1;
            animation: gradientShift 8s ease infinite;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .login-card:hover::before {
            opacity: 0.5;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Logo */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .logo {
            font-size: 80px;
            display: inline-block;
            animation: logoFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(25, 135, 84, 0.5));
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(5deg); }
            50% { transform: translateY(-5px) rotate(0deg); }
            75% { transform: translateY(-15px) rotate(-5deg); }
        }

        .logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border: 2px solid rgba(25, 135, 84, 0.3);
            border-radius: 50%;
            animation: ringPulse 2s ease-out infinite;
        }

        .logo-ring:nth-child(2) {
            animation-delay: 0.5s;
            width: 140px;
            height: 140px;
        }

        @keyframes ringPulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* Title */
        .system-title {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-weight: 900;
            font-size: 42px;
            margin-bottom: 5px;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #198754 0%, #0dcaf0 50%, #198754 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 3s linear infinite;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        .system-subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 50px;
            font-size: 16px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Buttons */
        .btn-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            margin-bottom: 40px;
        }

        .btn-login {
            position: relative;
            padding: 20px 40px;
            font-size: 16px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            overflow: hidden;
            min-width: 200px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-ranger {
            background: linear-gradient(135deg, rgba(25, 135, 84, 0.9) 0%, rgba(20, 108, 67, 0.9) 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(25, 135, 84, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            border: 1px solid rgba(25, 135, 84, 0.5);
        }

        .btn-ranger:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 40px rgba(25, 135, 84, 0.6), 0 0 60px rgba(25, 135, 84, 0.3);
            color: white;
        }

        .btn-admin {
            background: linear-gradient(135deg, rgba(220, 53, 69, 0.9) 0%, rgba(187, 45, 59, 0.9) 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(220, 53, 69, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            border: 1px solid rgba(220, 53, 69, 0.5);
        }

        .btn-admin:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 40px rgba(220, 53, 69, 0.6), 0 0 60px rgba(220, 53, 69, 0.3);
            color: white;
        }

        .btn-login:active {
            transform: translateY(-2px) scale(0.98);
        }

        .btn-icon {
            font-size: 32px;
            animation: iconBounce 2s ease-in-out infinite;
        }

        @keyframes iconBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Divider */
        .divider {
            margin: 30px 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
        }

        .divider-text {
            padding: 0 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Footer */
        .footer-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .security-badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .security-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 1px;
        }

        /* Status Indicator */
        .status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #198754;
            border-radius: 50%;
            animation: statusPulse 2s ease-in-out infinite;
            box-shadow: 0 0 10px #198754;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }

        /* Corner Decorations */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(25, 135, 84, 0.3);
        }

        .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        /* Responsive */
        @media (max-width: 576px) {
            .login-card {
                padding: 40px 25px;
            }
            .system-title {
                font-size: 28px;
                letter-spacing: 4px;
            }
            .btn-login {
                min-width: 160px;
                padding: 15px 30px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>

<!-- Animated Background -->
<div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- Grid Overlay -->
<div class="grid-overlay"></div>

<!-- Main Card -->
<div class="login-card">
    <div class="status-indicator">
        <div class="status-dot"></div>
        <span>System Online</span>
    </div>

    <!-- Corner Decorations -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Logo -->
    <div class="logo-container">
        <div class="logo-ring"></div>
        <div class="logo-ring"></div>
        <div class="logo">🐾</div>
    </div>

    <!-- Title -->
    <h1 class="system-title">TRACE IT</h1>
    <p class="system-subtitle">QENP Animal Monitoring Platform</p>

    <!-- Buttons -->
    <div class="btn-container">
        <a href="{% url 'ranger_login' %}" class="btn-login btn-ranger">
            <span class="btn-icon">🛡️</span>
            <span>Ranger Login</span>
        </a>
        <a href="{% url 'admin_login' %}" class="btn-login btn-admin">
            <span class="btn-icon">🔐</span>
            <span>Admin Login</span>
        </a>
    </div>

    <!-- Divider -->
    <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">Secure Access Only</span>
        <div class="divider-line"></div>
    </div>

    <!-- Footer -->
    <p class="footer-text">Authorized personnel only. Unauthorized access is prohibited.</p>
    <div class="security-badges">
        <div class="security-badge">
            <span>🔒</span> SSL Encrypted
        </div>
        <div class="security-badge">
            <span>🛡️</span> Protected
        </div>
        <div class="security-badge">
            <span>✓</span> Verified
        </div>
    </div>
</div>

</body>
</html>
