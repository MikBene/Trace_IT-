{% extends 'Trace_It/base.html' %}

{% block title %}Ranger Login - TRACE IT{% endblock %}

{% block extra_css %}
<style>
    .login-page {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }

    /* Animated Background Particles */
    .particles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
    }

    .particles span {
        position: absolute;
        display: block;
        width: 20px;
        height: 20px;
        background: rgba(25, 135, 84, 0.1);
        animation: particleFloat 20s linear infinite;
        bottom: -100px;
        border-radius: 50%;
    }

    .particles span:nth-child(1) { left: 20%; width: 60px; height: 60px; animation-delay: 0s; }
    .particles span:nth-child(2) { left: 60%; width: 30px; height: 30px; animation-delay: 2s; animation-duration: 15s; }
    .particles span:nth-child(3) { left: 80%; width: 50px; height: 50px; animation-delay: 4s; }
    .particles span:nth-child(4) { left: 40%; width: 25px; height: 25px; animation-delay: 0s; animation-duration: 18s; }
    .particles span:nth-child(5) { left: 10%; width: 40px; height: 40px; animation-delay: 3s; }

    @keyframes particleFloat {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(-800px) rotate(720deg); opacity: 0; }
    }

    /* Glassmorphism Card */
    .login-card-ranger {
        position: relative;
        z-index: 10;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(25, 135, 84, 0.3);
        border-radius: 25px;
        padding: 0;
        max-width: 450px;
        width: 100%;
        box-shadow: 
            0 25px 50px rgba(0, 0, 0, 0.5),
            0 0 80px rgba(25, 135, 84, 0.15);
        animation: cardEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        opacity: 0;
        transform: translateY(40px) scale(0.95);
        overflow: hidden;
    }

    @keyframes cardEntry {
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Glowing Border */
    .login-card-ranger::before {
        content: '';
        position: absolute;
        top: -2px; left: -2px; right: -2px; bottom: -2px;
        background: linear-gradient(45deg, #198754, #0dcaf0, #198754);
        background-size: 300% 300%;
        border-radius: 27px;
        z-index: -1;
        animation: gradientShift 6s ease infinite;
        opacity: 0.4;
    }

    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Header */
    .login-header {
        background: linear-gradient(135deg, rgba(25, 135, 84, 0.9) 0%, rgba(20, 108, 67, 0.9) 100%);
        padding: 35px 30px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .login-header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        animation: headerGlow 4s ease-in-out infinite;
    }

    @keyframes headerGlow {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 0.8; }
    }

    .login-icon {
        font-size: 50px;
        margin-bottom: 10px;
        display: inline-block;
        animation: iconFloat 3s ease-in-out infinite;
        position: relative;
        z-index: 1;
    }

    @keyframes iconFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    .login-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: white;
        margin: 0;
        position: relative;
        z-index: 1;
    }

    .login-subtitle {
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 5px;
        position: relative;
        z-index: 1;
    }

    /* Body */
    .login-body {
        padding: 40px 35px;
    }

    /* Form Inputs */
    .form-group {
        margin-bottom: 25px;
        position: relative;
    }

    .form-label {
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 8px;
        display: block;
    }

    .form-control-custom {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(25, 135, 84, 0.3);
        border-radius: 12px;
        padding: 15px 20px;
        color: white;
        font-size: 15px;
        width: 100%;
        transition: all 0.3s;
        outline: none;
    }

    .form-control-custom:focus {
        background: rgba(255, 255, 255, 0.12);
        border-color: #198754;
        box-shadow: 0 0 20px rgba(25, 135, 84, 0.3);
    }

    .form-control-custom::placeholder {
        color: rgba(255, 255, 255, 0.3);
    }

    /* Submit Button */
    .btn-submit {
        background: linear-gradient(135deg, #198754 0%, #146c43 100%);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 16px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        width: 100%;
        cursor: pointer;
        transition: all 0.4s;
        position: relative;
        overflow: hidden;
        box-shadow: 0 8px 25px rgba(25, 135, 84, 0.4);
    }

    .btn-submit::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: left 0.5s;
    }

    .btn-submit:hover::before {
        left: 100%;
    }

    .btn-submit:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(25, 135, 84, 0.6);
    }

    .btn-submit:active {
        transform: translateY(-1px);
    }

    /* Divider */
    .login-divider {
        display: flex;
        align-items: center;
        margin: 25px 0;
    }

    .login-divider-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
    }

    .login-divider-text {
        padding: 0 15px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    /* Switch Link */
    .switch-link {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-size: 13px;
        letter-spacing: 1px;
        transition: all 0.3s;
        display: inline-block;
        padding: 8px 20px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .switch-link:hover {
        color: #198754;
        border-color: rgba(25, 135, 84, 0.5);
        background: rgba(25, 135, 84, 0.1);
    }

    /* Corner Decorations */
    .corner {
        position: absolute;
        width: 30px;
        height: 30px;
        border: 2px solid rgba(25, 135, 84, 0.4);
    }

    .corner-tl { top: 15px; left: 15px; border-right: none; border-bottom: none; }
    .corner-tr { top: 15px; right: 15px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 15px; left: 15px; border-right: none; border-top: none; }
    .corner-br { bottom: 15px; right: 15px; border-left: none; border-top: none; }

    /* Status Dot */
    .status-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 20px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .status-dot {
        width: 8px;
        height: 8px;
        background: #198754;
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
        box-shadow: 0 0 10px #198754;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.5); }
    }
</style>
{% endblock %}

{% block content %}
<div class="login-page">
    <div class="particles">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="login-card-ranger">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="login-header">
            <div class="login-icon">🛡️</div>
            <h4 class="login-title">Ranger Login</h4>
            <small class="login-subtitle">Field Personnel Access</small>
        </div>

        <div class="login-body">
            <div class="status-bar">
                <div class="status-dot"></div>
                <span>Secure Connection</span>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control-custom" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control-custom" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-submit">Login as Ranger</button>
            </form>

            <div class="login-divider">
                <div class="login-divider-line"></div>
                <span class="login-divider-text">or</span>
                <div class="login-divider-line"></div>
            </div>

            <div class="text-center">
                <a href="{% url 'admin_login' %}" class="switch-link">🔐 Login as Admin instead</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
